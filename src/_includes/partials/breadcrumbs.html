<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}"
    }
    {% if collectionType %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "{{ collectionType | title }}",
      "item": "{{ site.url }}/{{ collectionType }}/"
    }
    {% endif %}
    {% if title %}
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": "{{ title }}",
      "item": "{{ site.url }}{{ page.url | url }}"
    }
    {% endif %}
  ]
}
</script>
