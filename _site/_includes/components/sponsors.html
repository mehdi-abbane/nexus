<section
  aria-labelledby="sponsors-heading"
  class="sponsors-list w-full py-8 bg-black mb-20"
>
  <h2 id="sponsors-heading" class="sr-only">Our Sponsors</h2>

  <div class="marquee-viewport flex w-full gap-12 whitespace-nowrap overflow-hidden">
    <ul
      class="flex min-w-full shrink-0 items-center justify-around gap-12 execution-track"
      id="logo-track-1"
    >
      {% for sponsor in sponsors %}
      <li>
        <img
          eleventy:ignore
          src="{{ sponsor.src }}"
          alt="{{ sponsor.alt }}"
          loading="lazy"
          decoding="async"
          class="h-8 w-auto object-contain brightness-90 hover:brightness-100 transition-opacity duration-200"
        />
      </li>
      {% endfor %}
    </ul>

    <ul
      class="flex min-w-full shrink-0 items-center justify-around gap-12 execution-track"
      id="logo-track-2"
      aria-hidden="true"
    >
      {% for sponsor in sponsors %}
      <li>
        <img
          src="{{ sponsor.src }}"
          eleventy:ignore
          alt=""
          loading="lazy"
          decoding="async"
          class="h-8 w-auto object-contain brightness-90"
        />
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
